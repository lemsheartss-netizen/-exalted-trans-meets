<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Exalted Trans Meets</title>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<style>
body { font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0; }
.form-container { background:#1a1a2e;padding:40px;border-radius:16px;max-width:420px;width:100%; }
input { width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;background:#16213e;color:white; }
.btn { width:100%;padding:14px;background:#e91e63;color:white;border:none;border-radius:50px;font-size:1.1rem;cursor:pointer; }
</style>
</head>
<body>
<div class="form-container">
<h2 style="text-align:center;">Create Your Account</h2>
<form id="regForm">
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY_HERE" style="margin:15px 0;"></div>
<button type="button" class="btn" onclick="submitForm()">Join & Connect via Trillian</button>
</form>
</div>
<script>
function submitForm() {
  const response = grecaptcha.getResponse();
  if (response.length === 0) {
    alert("Please complete the reCAPTCHA verification.");
    return;
  }
  alert("Registration successful! Welcome to Exalted Trans Meets");
  window.location.href = "https://trillian.im/";
}
</script>
</body>
</html>
